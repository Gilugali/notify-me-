<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: sans-serif; width: 340px; padding: 12px; margin: 0; }
      header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      h1 { font-size: 14px; margin: 0; }
      button { padding: 4px 10px; font-size: 12px; cursor: pointer; }
      #status { font-size: 11px; color: #666; margin: 4px 0 10px; }
      #list { display: flex; flex-direction: column; gap: 6px; max-height: 400px; overflow-y: auto; }
      .item { display: block; padding: 8px; border: 1px solid #e5e5e5; border-radius: 4px; text-decoration: none; color: inherit; }
      .item:hover { background: #f5f5f5; }
      .title { font-weight: 600; font-size: 13px; }
      .meta { font-size: 11px; color: #666; margin-top: 2px; }
      .empty { font-size: 12px; color: #999; padding: 12px; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <h1>Assignments</h1>
      <button id="refresh">Refresh</button>
    </header>
    <div id="status"></div>
    <div id="list"></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
